services:
  gateway:
    build: ./gateway
    ports:
      - "${GATEWAY_PORT}:8080"
    environment:
      GATEWAY_PORT: 8080
      SMS_SERVICE_URL: "http://sms-service:3000"
      AUTH_SERVICE_URL: "http://auth-service:80"
      CORS_ORIGIN: "*"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4318"
      RATE_LIMIT_PER_MINUTE: 300
    depends_on:
      - sms-service
      - auth-service
      - jaeger
    networks:
      - smspit

  auth-service:
    build: ./auth-service
    ports:
      - "${AUTH_SERVICE_PORT}:80"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "http://localhost:${AUTH_SERVICE_PORT}"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
    depends_on:
      - postgres
      - jaeger
    networks:
      - smspit

  sms-service:
    build: ./sms-service
    ports:
      - "${SMS_SERVICE_PORT}:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: "*"
      AUTH_SERVICE_URL: "http://auth-service:80"
      AI_SERVICE_URL: "http://ai-service:8001"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
    depends_on:
      - postgres
      - redis
      - auth-service
      - jaeger
    networks:
      - smspit

  ai-service:
    build: ./ai-service
    ports:
      - "${AI_SERVICE_PORT}:8001"
    environment:
      PORT: 8001
      CORS_ORIGIN: "*"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
    depends_on:
      - jaeger
    networks:
      - smspit

  worker:
    build: ./worker
    environment:
      AI_SERVICE_URL: "http://ai-service:8001"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4318"
    depends_on:
      - redis
      - ai-service
      - jaeger
    networks:
      - smspit

  dashboard:
    build: ./dashboard
    ports:
      - "${DASHBOARD_PORT}:80"
    environment:
      # Routed through the gateway (Day 49) rather than sms-service
      # directly, now that the gateway proxies both /api/v1/* and /ws.
      VITE_API_BASE_URL: "http://localhost:${GATEWAY_PORT}"
      # The API key management page (Day 47) still calls auth-service
      # directly -- its routes aren't rewritten to match the gateway's
      # /auth/* -> /api/* convention.
      VITE_AUTH_SERVICE_URL: "http://localhost:${AUTH_SERVICE_PORT}"
      # Same reasoning as VITE_AUTH_SERVICE_URL above -- ai-service isn't
      # routed through the gateway either (Day 79), and the "generate
      # test data" button (Day 75) calls it directly, unauthenticated.
      VITE_AI_SERVICE_URL: "http://localhost:${AI_SERVICE_PORT}"
      # sms-service requires an API key as of Day 35. There's still no
      # automated way to generate the first one here -- the /api-keys
      # page itself needs no key (auth-service's key endpoints are
      # unauthenticated, since generating the first key is how you'd
      # bootstrap auth in the first place), so create one there or via
      # POST /api/api-keys directly, then set DASHBOARD_API_KEY in your
      # own .env.
      VITE_API_KEY: "${DASHBOARD_API_KEY:-}"
    depends_on:
      - gateway
    networks:
      - smspit

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smspit

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - smspit

  # All-in-one Jaeger (Day 83): OTLP/HTTP receiver on 4318, trace UI on
  # 16686. In-memory storage only -- fine for local dev/CI, not meant to
  # persist traces across restarts.
  jaeger:
    image: jaegertracing/all-in-one:1.58
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
    networks:
      - smspit

  # Scrapes every service's /metrics (Day 84) -- see
  # docker/prometheus/prometheus.yml for the target list.
  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - gateway
      - auth-service
      - sms-service
      - ai-service
      - worker
    networks:
      - smspit

  # Dashboards (Day 85), auto-provisioned from docker/grafana/ -- the
  # Prometheus datasource and every dashboard JSON load with no
  # manual click-through on first run.
  grafana:
    image: grafana/grafana:11.3.1
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards/files:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    networks:
      - smspit

networks:
  smspit:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
