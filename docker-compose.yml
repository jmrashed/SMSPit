services:
  # ai-service and worker don't have Dockerfiles yet (Day 79) -- adding a
  # `build:` entry for them here would break `docker compose up` today.
  # They're wired in on that checklist day.

  gateway:
    build: ./gateway
    ports:
      - "${GATEWAY_PORT}:8080"
    environment:
      GATEWAY_PORT: 8080
      SMS_SERVICE_URL: "http://sms-service:3000"
      AUTH_SERVICE_URL: "http://auth-service:80"
    depends_on:
      - sms-service
      - auth-service
    networks:
      - smspit

  auth-service:
    build: ./auth-service
    ports:
      - "${AUTH_SERVICE_PORT}:80"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "http://localhost:${AUTH_SERVICE_PORT}"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
    depends_on:
      - postgres
    networks:
      - smspit

  sms-service:
    build: ./sms-service
    ports:
      - "${SMS_SERVICE_PORT}:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: "*"
      AUTH_SERVICE_URL: "http://auth-service:80"
    depends_on:
      - postgres
      - redis
      - auth-service
    networks:
      - smspit

  dashboard:
    build: ./dashboard
    ports:
      - "${DASHBOARD_PORT}:80"
    environment:
      # Routed through the gateway (Day 49) rather than sms-service
      # directly, now that the gateway proxies both /api/v1/* and /ws.
      VITE_API_BASE_URL: "http://localhost:${GATEWAY_PORT}"
      # The API key management page (Day 47) still calls auth-service
      # directly -- its routes aren't rewritten to match the gateway's
      # /auth/* -> /api/* convention.
      VITE_AUTH_SERVICE_URL: "http://localhost:${AUTH_SERVICE_PORT}"
      # sms-service requires an API key as of Day 35. There's still no
      # automated way to generate the first one here -- the /api-keys
      # page itself needs no key (auth-service's key endpoints are
      # unauthenticated, since generating the first key is how you'd
      # bootstrap auth in the first place), so create one there or via
      # POST /api/api-keys directly, then set DASHBOARD_API_KEY in your
      # own .env.
      VITE_API_KEY: "${DASHBOARD_API_KEY:-}"
    depends_on:
      - gateway
    networks:
      - smspit

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smspit

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - smspit

networks:
  smspit:
    driver: bridge

volumes:
  postgres_data:
