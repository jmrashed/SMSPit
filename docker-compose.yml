services:
  # gateway, auth-service, ai-service, and worker don't have Dockerfiles
  # yet (auth-service/gateway land Day 48-49, ai-service/worker Day 79)
  # -- adding a `build:` entry for them here would break `docker compose
  # up` today. They're wired back in on those checklist days.

  sms-service:
    build: ./sms-service
    ports:
      - "${SMS_SERVICE_PORT}:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: "*"
    depends_on:
      - postgres
      - redis
    networks:
      - smspit

  dashboard:
    build: ./dashboard
    ports:
      - "${DASHBOARD_PORT}:80"
    environment:
      VITE_API_BASE_URL: "http://localhost:${SMS_SERVICE_PORT}"
      # sms-service requires an API key as of Day 35. auth-service isn't
      # wired into compose until Day 49, so there's no automated way to
      # generate one here yet -- set DASHBOARD_API_KEY in your own .env
      # once you've created a key manually against auth-service.
      VITE_API_KEY: "${DASHBOARD_API_KEY:-}"
    depends_on:
      - sms-service
    networks:
      - smspit

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smspit

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - smspit

networks:
  smspit:
    driver: bridge

volumes:
  postgres_data:
