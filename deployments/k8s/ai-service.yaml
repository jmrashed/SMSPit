apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: smspit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: ghcr.io/jmrashed/smspit-ai-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: PORT
              value: "8001"
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: smspit-config
                  key: CORS_ORIGIN
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: smspit
spec:
  selector:
    app: ai-service
  ports:
    - port: 8001
      targetPort: 8001
