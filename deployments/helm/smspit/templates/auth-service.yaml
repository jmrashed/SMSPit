apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smspit.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.authService.replicaCount }}
  selector:
    matchLabels:
      {{- include "smspit.selectorLabels" "auth-service" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "smspit.selectorLabels" "auth-service" | nindent 8 }}
    spec:
      containers:
        - name: auth-service
          image: "{{ .Values.authService.image.repository }}:{{ .Values.authService.image.tag }}"
          imagePullPolicy: {{ .Values.authService.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.authService.service.port }}
          envFrom:
            - configMapRef:
                name: smspit-config
          env:
            - name: DB_CONNECTION
              value: pgsql
            - name: DB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: smspit-config
                  key: POSTGRES_DB
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: smspit-config
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smspit-secrets
                  key: POSTGRES_PASSWORD
            - name: SESSION_DRIVER
              value: database
            - name: QUEUE_CONNECTION
              value: database
            - name: CACHE_STORE
              value: database
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.authService.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.authService.service.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.authService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smspit.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "smspit.selectorLabels" "auth-service" | nindent 4 }}
  ports:
    - port: {{ .Values.authService.service.port }}
      targetPort: {{ .Values.authService.service.port }}
