apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smspit.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "smspit.selectorLabels" "gateway" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "smspit.selectorLabels" "gateway" | nindent 8 }}
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.gateway.service.port }}
          env:
            - name: GATEWAY_PORT
              value: {{ .Values.gateway.service.port | quote }}
            - name: SMS_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: smspit-config
                  key: SMS_SERVICE_URL
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: smspit-config
                  key: AUTH_SERVICE_URL
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: smspit-config
                  key: CORS_ORIGIN
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.gateway.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.gateway.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smspit.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "smspit.selectorLabels" "gateway" | nindent 4 }}
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: {{ .Values.gateway.service.port }}
  type: {{ .Values.gateway.service.type }}
