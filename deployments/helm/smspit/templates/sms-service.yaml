apiVersion: apps/v1
kind: Deployment
metadata:
  name: sms-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smspit.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.smsService.replicaCount }}
  selector:
    matchLabels:
      {{- include "smspit.selectorLabels" "sms-service" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "smspit.selectorLabels" "sms-service" | nindent 8 }}
    spec:
      containers:
        - name: sms-service
          image: "{{ .Values.smsService.image.repository }}:{{ .Values.smsService.image.tag }}"
          imagePullPolicy: {{ .Values.smsService.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.smsService.service.port }}
          envFrom:
            - configMapRef:
                name: smspit-config
          env:
            - name: DB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: smspit-config
                  key: POSTGRES_DB
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: smspit-config
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smspit-secrets
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /api/v1
              port: {{ .Values.smsService.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1
              port: {{ .Values.smsService.service.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.smsService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: sms-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smspit.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "smspit.selectorLabels" "sms-service" | nindent 4 }}
  ports:
    - port: {{ .Values.smsService.service.port }}
      targetPort: {{ .Values.smsService.service.port }}
