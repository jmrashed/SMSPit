apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smspit.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.aiService.replicaCount }}
  selector:
    matchLabels:
      {{- include "smspit.selectorLabels" "ai-service" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "smspit.selectorLabels" "ai-service" | nindent 8 }}
    spec:
      containers:
        - name: ai-service
          image: "{{ .Values.aiService.image.repository }}:{{ .Values.aiService.image.tag }}"
          imagePullPolicy: {{ .Values.aiService.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.aiService.service.port }}
          env:
            - name: PORT
              value: {{ .Values.aiService.service.port | quote }}
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: smspit-config
                  key: CORS_ORIGIN
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.aiService.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.aiService.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.aiService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smspit.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "smspit.selectorLabels" "ai-service" | nindent 4 }}
  ports:
    - port: {{ .Values.aiService.service.port }}
      targetPort: {{ .Values.aiService.service.port }}
