name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: editorconfig-checker/action-editorconfig-checker@v2
      - run: editorconfig-checker

  auth-service:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smspit
          POSTGRES_PASSWORD: smspit
          POSTGRES_DB: smspit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pgsql, dom, xml, mbstring
      - name: Migrate and test (owned by auth-service, see docs/architecture.md)
        working-directory: auth-service
        run: |
          composer install --no-interaction --prefer-dist
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force
          php artisan test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: smspit_test
          DB_USERNAME: smspit
          DB_PASSWORD: smspit

  sms-service:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smspit
          POSTGRES_PASSWORD: smspit
          POSTGRES_DB: smspit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      # sms-service's e2e suite talks to auth-service's schema (see the
      # existing job comment above) -- migrate it the same way here too.
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pgsql, dom, xml, mbstring
      - working-directory: auth-service
        run: |
          composer install --no-interaction --prefer-dist
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: smspit_test
          DB_USERNAME: smspit
          DB_PASSWORD: smspit

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sms-service/package-lock.json
      - name: sms-service unit + integration tests
        working-directory: sms-service
        run: |
          npm ci
          npm run build
          npm run test:cov
          npm run test:e2e
        env:
          TEST_DB_DATABASE: smspit_test

  gateway:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: gateway/go.mod
      - working-directory: gateway
        run: |
          go vet ./...
          go test ./...

  worker:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: worker/go.mod
      - working-directory: worker
        run: |
          go vet ./...
          go test ./...

  ai-service:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - working-directory: ai-service
        run: |
          python -m pip install -r requirements-dev.txt
          pytest

  dashboard:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - working-directory: dashboard
        run: |
          npm ci
          npm run lint
          npm run build

  sdks:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: curl
      - uses: actions/setup-go@v5
        with:
          go-version-file: sdks/go/go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - working-directory: sdks/php
        run: |
          composer install --no-interaction --prefer-dist
          vendor/bin/phpunit
      - working-directory: sdks/go
        run: go test ./...
      - working-directory: sdks/nodejs
        run: |
          npm ci
          npm test
          npm run build
      - working-directory: sdks/python
        run: |
          pip install -e ".[dev]"
          pytest

  # Builds and pushes every service's image to GHCR when a version tag
  # (v*) is pushed. Runs after every test job so a broken build never
  # gets published. Untested end-to-end in this environment (no Docker
  # available -- see CLAUDE.md's note on docker-compose verification);
  # each Dockerfile was verified to build via the host toolchain instead
  # (Days 26/27/48/79), so this wires up the already-verified images
  # rather than introducing new ones.
  publish-images:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [auth-service, sms-service, gateway, worker, ai-service, dashboard, sdks]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [gateway, auth-service, sms-service, ai-service, worker, dashboard]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/smspit-${{ matrix.service }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/smspit-${{ matrix.service }}:latest

  # Deploys the tagged images to a staging cluster via the Day 82 Helm
  # chart. Gated behind the `staging` GitHub Environment so it requires
  # a KUBE_CONFIG_STAGING secret and (if configured) manual approval --
  # neither exists yet in this repo, so this job is wired up but will
  # not run until a real staging cluster and secret are provisioned.
  # Until then, deployments/helm/smspit's own README covers deploying
  # the same chart manually.
  deploy-staging:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-images
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > "$HOME/.kube/config"
      - name: helm upgrade --install
        run: |
          helm upgrade --install smspit deployments/helm/smspit \
            --namespace smspit-staging --create-namespace \
            --set gateway.image.tag=${{ github.ref_name }} \
            --set authService.image.tag=${{ github.ref_name }} \
            --set smsService.image.tag=${{ github.ref_name }} \
            --set aiService.image.tag=${{ github.ref_name }} \
            --set worker.image.tag=${{ github.ref_name }} \
            --set dashboard.image.tag=${{ github.ref_name }}
