name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: editorconfig-checker/action-editorconfig-checker@v2
      - run: editorconfig-checker

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smspit
          POSTGRES_PASSWORD: smspit
          POSTGRES_DB: smspit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pgsql, dom, xml, mbstring

      - name: Migrate test database schema (owned by auth-service, see docs/architecture.md)
        working-directory: auth-service
        run: |
          composer install --no-interaction --prefer-dist
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: smspit_test
          DB_USERNAME: smspit
          DB_PASSWORD: smspit

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: sms-service/package-lock.json

      - name: sms-service unit + integration tests
        working-directory: sms-service
        run: |
          npm ci
          npm run build
          npm run test:cov
          npm run test:e2e
        env:
          TEST_DB_DATABASE: smspit_test
